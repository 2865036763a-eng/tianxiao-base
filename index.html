<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2 图床</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text2: #888;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p { color: var(--text2); font-size: 14px; }

    .dropzone {
      width: 100%;
      max-width: 600px;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--card);
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    .dropzone .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropzone .icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
    }

    .dropzone h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .dropzone p { color: var(--text2); font-size: 13px; }
    .dropzone input { display: none; }

    .previews {
      width: 100%;
      max-width: 600px;
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }

    .preview-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
    }

    .preview-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-card .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .preview-card:hover .remove { opacity: 1; }

    .upload-btn {
      width: 100%;
      max-width: 600px;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .upload-btn:hover:not(:disabled) { opacity: 0.9; }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .results {
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .result-card img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-info .name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }

    .tab {
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .link-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .link-box code {
      flex: 1;
      font-size: 11px;
      background: rgba(255,255,255,0.05);
      padding: 6px 10px;
      border-radius: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'SF Mono', monospace;
      color: var(--text2);
    }

    .copy-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.12); }
    .copy-btn.copied { background: rgba(34,197,94,0.15); color: var(--success); border-color: var(--success); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
      color: var(--text2);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .dropzone { padding: 32px 20px; }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>R2 图床</h1>
    <p>拖拽或点击上传图片，支持 JPG、PNG、GIF、WebP</p>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>拖拽图片到此处</h3>
    <p>或点击选择文件，单文件最大 20MB</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="previews" id="previews"></div>

  <button class="upload-btn" id="uploadBtn" disabled>
    请先选择图片
  </button>

  <div class="results" id="results"></div>

  <div class="toast" id="toast"></div>

  <footer>
    图片存储于 Cloudflare R2 &middot; 请勿上传违规内容
  </footer>

  <script>
    // Worker API 地址
    const WORKER_URL = 'https://pvz-api.' + location.host;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const previewsEl = document.getElementById('previews');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultsEl = document.getElementById('results');
    const toastEl = document.getElementById('toast');

    let selectedFiles = [];

    // 拖拽事件
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      addFiles(files);
    });
    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
      addFiles(files);
    });

    function addFiles(files) {
      selectedFiles = [...selectedFiles, ...files];
      renderPreviews();
      updateUploadBtn();
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderPreviews();
      updateUploadBtn();
    }

    function renderPreviews() {
      previewsEl.innerHTML = '';
      selectedFiles.forEach((file, i) => {
        const url = URL.createObjectURL(file);
        const card = document.createElement('div');
        card.className = 'preview-card';
        card.innerHTML = `
          <img src="${url}" alt="${file.name}">
          <button class="remove" onclick="removeFile(${i})">&times;</button>
        `;
        previewsEl.appendChild(card);
      });
    }

    function updateUploadBtn() {
      if (selectedFiles.length === 0) {
        uploadBtn.textContent = '请先选择图片';
        uploadBtn.disabled = true;
      } else {
        uploadBtn.textContent = `上传 ${selectedFiles.length} 张图片`;
        uploadBtn.disabled = false;
      }
    }

    // 上传
    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;
      uploadBtn.disabled = true;
      uploadBtn.innerHTML = '<span class="spinner"></span>上传中...';

      for (const file of selectedFiles) {
        const formData = new FormData();
        formData.append('file', file);

        try {
          const res = await fetch(`${WORKER_URL}/upload`, {
            method: 'POST',
            body: formData,
          });
          const data = await res.json();

          if (data.success) {
            showResult(data);
            showToast(`${file.name} 上传成功`, 'success');
          } else {
            showToast(data.error || `${file.name} 上传失败`, 'error');
          }
        } catch (err) {
          showToast(`${file.name} 上传失败: ${err.message}`, 'error');
        }
      }

      selectedFiles = [];
      previewsEl.innerHTML = '';
      updateUploadBtn();
    });

    function showResult(data) {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.dataset.url = data.url;
      card.dataset.name = data.name;
      card.innerHTML = `
        <img src="${data.url}" alt="${data.name}">
        <div class="result-info">
          <div class="name">${data.name}</div>
          <div class="tabs">
            <button class="tab active" data-format="url">URL</button>
            <button class="tab" data-format="markdown">Markdown</button>
            <button class="tab" data-format="html">HTML</button>
          </div>
          <div class="link-box">
            <code>${data.url}</code>
            <button class="copy-btn">复制</button>
          </div>
        </div>
      `;

      // Tab 切换
      card.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const format = tab.dataset.format;
          const url = card.dataset.url;
          const name = card.dataset.name;
          let text = url;
          if (format === 'markdown') text = `![${name}](${url})`;
          if (format === 'html') text = `<img src="${url}" alt="${name}" />`;
          card.querySelector('code').textContent = text;
        });
      });

      // 复制
      card.querySelector('.copy-btn').addEventListener('click', async function() {
        const text = card.querySelector('code').textContent;
        await navigator.clipboard.writeText(text);
        this.textContent = '已复制';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = '复制';
          this.classList.remove('copied');
        }, 2000);
      });

      resultsEl.insertBefore(card, resultsEl.firstChild);
    }

    function showToast(msg, type) {
      toastEl.textContent = msg;
      toastEl.className = `toast ${type} show`;
      setTimeout(() => toastEl.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
