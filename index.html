        /* 顶部导航升级为双 Tab */
        header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; text-align: center; position: sticky; top: 0; z-index: 100; }
        .site-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .site-tabs { display: flex; justify-content: center; gap: 20px; }
        .tab-item { font-size: 16px; padding: 5px 10px; cursor: pointer; color: #666; font-weight: bold; border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .admin-lock { position: absolute; right: 15px; top: 15px; cursor: pointer; font-size: 20px; z-index: 101; }
        .clear-cache-btn { position: absolute; left: 15px; top: 15px; cursor: pointer; font-size: 12px; color: #aaa; border: 1px solid #ddd; border-radius: 8px; padding: 4px 8px; background: #fff; z-index: 101; }

        /* 管理员控制台 */
        #admin-controls { display: none; padding: 10px 15px; background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #ff669933; gap: 10px; justify-content: center; position: relative; z-index: 101; flex-wrap: wrap; }
        .ctrl-btn { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--primary); background: #fff; color: var(--primary); font-size: 13px; font-weight: bold; cursor: pointer; }

        /* 工具栏区域 (搜索、分类、阵营) */
        .sticky-tools { background: rgba(255,255,255,0.88) !important; backdrop-filter: blur(4px); position: sticky; top: 80px; z-index: 99; background: #fff; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* v17.1 的分类标签栏 */
        #nav { display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px; scrollbar-width: none; margin: 0; list-style: none; }
        #nav li { padding: 6px 16px; background: #f0f0f0; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        #nav li.active { background: var(--primary); color: #fff; font-weight: bold; }

        /* 梯度的阵营切换栏 */
        .side-switcher { display: flex; justify-content: center; background: #f0f0f0; border-radius: 10px; padding: 4px; margin: 10px auto; width: fit-content; }
        .side-btn { padding: 6px 20px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; color:#666; }
        .side-btn.active.plant { background: var(--primary); color: #fff; }
        .side-btn.active.zombie { background: var(--zombie); color: #fff; }

        .search-bar { padding: 10px 15px; }
        .search-input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; background: #f9f9f9; }
        .search-input:focus { border-color: var(--primary); background: #fff; }

        /* 内容布局 */
        .grid { padding: 12px; display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* 编辑器面板 */
        #admin-editor { display: none; border: 2px solid var(--primary); border-radius: 15px; padding: 15px; background: #fff; margin-bottom: 20px; }
        .edit-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; display: block; word-break: break-all; overflow-wrap: break-word; }
        .editor-toolbar { display: flex; gap: 10px; margin-bottom: 5px; background: #f9f9f9; padding: 8px; border-radius: 8px; }
        .tool-btn { background: #fff; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }

        /* 轮播图 */
        #banner-wrap { width:100%; overflow:hidden; background:#fff; position:relative; }
        #banner-slider { position:relative; width:100%; overflow:hidden; }
        #banner-track { display:flex; transition:transform 0.4s ease; }
        #banner-track a { flex:0 0 100%; display:block; position:relative; overflow:hidden; }
        #banner-track img { width:100%; height:180px; object-fit:contain; background:#fff; display:block; } @media (min-width:600px) { #banner-track img { height:320px; } }
        #banner-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:10; }
        .b-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.3s; }
        .b-dot.active { background:#fff; }
        #banner-prev, #banner-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.35); color:#fff; border:none; font-size:24px; padding:4px 10px; cursor:pointer; z-index:10; border-radius:4px; }
        #banner-prev { left:6px; }
        #banner-next { right:6px; }

        

        /* ===== 积分榜 ===== */
        .pin-badge { display:inline-block;font-size:10px;background:#ff6699;color:#fff;padding:1px 6px;border-radius:4px;margin-right:5px;vertical-align:middle; }
        .rk-match-card { background:rgba(255,255,255,0.92);border-radius:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden; }
        .rk-match-header { display:flex;align-items:center;padding:14px 15px;cursor:pointer; }
        .rk-match-title { font-size:16px;font-weight:bold;flex:1;color:#222; }
        .rk-arrow { color:var(--primary);font-size:18px;margin-left:6px; }
        .rk-admin-btn { margin-left:6px;border:1px solid;background:none;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer; }
        .rk-group-title { font-size:15px;font-weight:bold;color:#fff;background:var(--primary);padding:8px 15px;border-radius:10px 10px 0 0;margin-top:12px; }
        .rk-table { width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06); }
        .rk-table th { background:#f8f8f8;color:#888;font-size:12px;padding:8px 4px;text-align:center;border-bottom:1px solid #eee; }
        .rk-table td { padding:10px 4px;text-align:center;border-bottom:1px solid #f5f5f5;font-size:14px; }
        .rk-table tr:last-child td { border-bottom:none; }
        .rk-rank { font-weight:bold;font-size:15px;color:var(--primary); }
        .rk-rank-1 .rk-rank { color:#f5a623;font-size:17px; }
        .rk-rank-2 .rk-rank { color:#9b9b9b; }
        .rk-rank-3 .rk-rank { color:#cd7f32; }
        .rk-name { font-weight:bold;color:#222;text-align:left;padding-left:8px; }
        .rk-blue { font-weight:bold;color:#1e90ff; }
        .rk-gray { color:#999;font-size:12px; }
        .rk-edit-wrap { background:#fff;border-radius:12px;padding:12px;margin-top:8px;overflow-x:auto; }
        .rk-edit-table { width:100%;border-collapse:collapse;font-size:12px;min-width:400px; }
        .rk-edit-table th { background:#f8f8f8;padding:7px 4px;text-align:center;border:1px solid #eee;color:#666; }
        .rk-edit-table td { border:1px solid #eee;padding:2px; }
        .rk-edit-table input { width:100%;border:none;padding:5px 3px;font-size:12px;text-align:center;background:transparent; }
        .rk-edit-table input:focus { background:#fff5f8;outline:none; }

        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); border-radius: 15px; border: 1px solid #e0e0e0; overflow: hidden; margin-bottom:12px; }
        .card-main { display: flex; cursor: pointer; }
        .card-thumb { width: 110px; min-width: 110px; max-height: 130px; background: #eee; overflow: hidden; }
        .card-thumb img { width: 100%; height: 130px; object-fit: cover; object-position: center; }
        .card-content { flex: 1; padding: 12px; }
        .card-title { font-size: 15px; font-weight: bold; color: #222; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; }
        .pin-badge { display:inline-block; font-size:10px; background:#ff6699; color:#fff; padding:1px 6px; border-radius:4px; margin-right:5px; vertical-align:middle; }
        .card-tag { display: inline-block; font-size: 10px; color: var(--primary); border: 1px solid var(--primary); padding: 0 5px; border-radius: 4px; margin-top: 8px; margin-right: 4px; }
        .detail-pane { display: none; padding: 20px 15px; background: #fff; border-top: 2px solid #f0f0f0; }
        .card.expanded .detail-pane { display: block; }
        .card.expanded .card-main { display: none; }
        .full-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; line-height: 1.3; color: #000; word-break: break-all; }
        .article-content { font-size: 16px; line-height: 1.8; color: #333; }
        .article-content p { margin: 0 0 15px 0; word-break: break-all; }
        .article-content img { width: 100%; border-radius: 10px; margin: 10px 0; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* ======= 梯度排行样式 ======= */
        .tier-row { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tier-header { font-weight: 900; font-size: 24px; margin-bottom: 12px; font-style: italic; display: flex; align-items: baseline; gap: 6px; }
        .tier-header small { font-size: 10px; color: #aaa; font-style: normal; }
        .tier-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; justify-items: center; }
        .tier-item { text-align: center; cursor: pointer; width: 75px; }
        .tier-img { width: 64px; height: 82px; border-radius: 10px; object-fit: cover; border: 2px solid #eee; background: #fdfdfd; }
        .tier-img.gold-border { border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .tier-name { font-size: 11px; margin-top: 6px; color: #444; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 梯度详情弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .stat-card { background: #fff; width: 100%; max-width: 360px; border-radius: 28px; overflow: hidden; animation: slideUp 0.3s; }
        .stat-header { background: #2c3e50; color: #fff; padding: 30px 20px; text-align: center; position: relative; }
        .stat-header.is-zombie { background: #4a148c; }
        .rank-badge { position: absolute; left: 20px; top: 20px; font-size: 30px; font-weight: 900; color: #ffeb3b; }
        .stat-body { padding: 25px; max-height: 60vh; overflow-y: auto;}
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #f8fafc; padding: 12px; border-radius: 14px; border: 1px solid #f1f5f9; }
        .stat-label { font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-weight: 800; font-size: 16px; color: #1e293b; }

        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ===== 对战BP ===== */
        .bp-match-card { background:rgba(255,255,255,0.92); border-radius:14px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.06); overflow:hidden; }
        .bp-match-header { display:flex; align-items:center; padding:12px 15px; cursor:pointer; }
        .bp-match-title { font-size:15px; font-weight:bold; flex:1; color:#222; }
        .bp-admin-btn { margin-left:6px; border:1px solid; background:none; padding:4px 8px; border-radius:6px; font-size:11px; cursor:pointer; }
        .bp-body { padding:10px 12px 12px; }
        .bp-vs-row { display:flex; gap:8px; align-items:flex-start; }
        .bp-side { flex:1; min-width:0; }
        .bp-side-label { font-size:12px; font-weight:bold; margin-bottom:5px; }
        .bp-cards-row { display:flex; flex-wrap:wrap; gap:4px; }
        .bp-card { width:44px; height:56px; border-radius:6px; background:#f0f0f0; border:1.5px solid #ddd; overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
        .bp-card img { width:100%; height:100%; object-fit:cover; }
        .bp-card.empty { background:repeating-linear-gradient(45deg,#f5f5f5,#f5f5f5 4px,#ececec 4px,#ececec 8px); }
        .bp-card.ban { width:36px; height:46px; border-radius:5px; }
        .bp-card.ban img { filter:grayscale(60%) opacity(0.7); }
        .bp-card.ban::after { content:'✕'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(200,0,0,0.75); font-size:18px; font-weight:900; pointer-events:none; }
        .bp-ban-row { display:flex; align-items:center; gap:4px; margin-top:5px; }
        .bp-ban-label { font-size:10px; color:#999; white-space:nowrap; }
        .bp-divider-v { width:1px; background:#eee; align-self:stretch; margin:0 4px; flex-shrink:0; }
    </style>

<script id="data-script">
    let resources = []; 
    let tierData = [];
    let navTags = ["全部", "最新咨询", "梯度", "版本", "比赛时间"];
    let rankingList = []; // [{title, data:[...]}]
    let rkOpenIdx = null;
    let rkAutoRankIdx = null; // 记录当前开启自动排名的比赛
    let bpList = []; // 对战BP数据
    let bpOpenIdx = null; // 当前展开的BP
    let bannerData = [];
</script>

<script>
    let isAdmin = false;
    let adminToken = null;
    let activePage = 'community'; // 'community' | 'tier'
    let currentSide = 'plant';
    let currentFilter = "全部";
    let searchQuery = "";
    let editMode = 'post'; // 'post' | 'tier'

    // ☁️ Cloudflare Worker 地址（结尾不加斜杠）
    const WORKER_URL = 'https://pvz-api.pvzdlc.qzz.io';

    function showBannerEditor() {
        const banners = (bannerData) || [];
        const list = document.getElementById('banner-list');
        list.innerHTML = '';
        banners.forEach((b, i) => list.appendChild(bannerSlideEl(b, i)));
        document.getElementById('banner-editor').style.display = 'block';
    }

    function bannerSlideEl(b, i) {
        const div = document.createElement('div');
        div.style.cssText = 'border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:10px;';
        div.innerHTML = `
            <input placeholder="图片URL（必填）" value="${b.img||''}" oninput="bannerFieldUpdate(${i},'img',this.value)" style="width:100%;padding:8px;margin-bottom:6px;border:1px solid #ddd;border-radius:8px;font-size:13px;">
            <input placeholder="点击跳转链接（可选）" value="${b.link||''}" oninput="bannerFieldUpdate(${i},'link',this.value)" style="width:100%;padding:8px;margin-bottom:6px;border:1px solid #ddd;border-radius:8px;font-size:13px;">
            <input placeholder="底部标题文字（可选）" value="${b.title||''}" oninput="bannerFieldUpdate(${i},'title',this.value)" style="width:100%;padding:8px;margin-bottom:6px;border:1px solid #ddd;border-radius:8px;font-size:13px;">
            <button onclick="bannerRemove(${i})" style="color:red;border:1px solid red;background:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;">删除</button>
        `;
        return div;
    }

    function bannerFieldUpdate(i, field, val) {
        if (!bannerData) bannerData = [];
        bannerData[i][field] = val;
    }

    function bannerAddSlide() {
        if (!bannerData) bannerData = [];
        bannerData.push({ img: '', link: '', title: '' });
        showBannerEditor();
    }

    function bannerRemove(i) {
        bannerData.splice(i, 1);
        showBannerEditor();
    }

    function bannerSave() {
        document.getElementById('banner-editor').style.display = 'none';
        renderBanner();
    }

    
    let bannerIndex = 0;
    let bannerTimer = null;

    function renderBanner() {
        const banners = (bannerData) || [];
        const wrap = document.getElementById('banner-wrap');
        const track = document.getElementById('banner-track');
        const dots = document.getElementById('banner-dots');
        if (!banners.length) { wrap.style.display = 'none'; return; }
        wrap.style.display = 'block';
        track.innerHTML = banners.map(b => `
            <a href="${b.link || 'javascript:void(0)'}" ${b.link ? 'target="_blank"' : ''}>
                <img src="${b.img}" alt="${b.title || ''}">
                ${b.title ? `<div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0) 100%);color:#fff;font-size:13px;font-weight:bold;padding:20px 12px 8px;text-align:left;">${b.title}</div>` : ''}
            </a>
        `).join('');
        dots.innerHTML = banners.map((_, i) => `<div class="b-dot ${i===0?'active':''}" onclick="bannerGo(${i})"></div>`).join('');
        bannerIndex = 0;
        bannerUpdate();
        clearInterval(bannerTimer);
        if (banners.length > 1) bannerTimer = setInterval(() => bannerMove(1), 4000);
    }

    function bannerMove(dir) {
        const banners = (bannerData) || [];
        if (!banners.length) return;
        bannerIndex = (bannerIndex + dir + banners.length) % banners.length;
        bannerUpdate();
    }

    function bannerGo(i) { bannerIndex = i; bannerUpdate(); }

    function bannerUpdate() {
        document.getElementById('banner-track').style.transform = `translateX(-${bannerIndex * 100}%)`;
        document.querySelectorAll('.b-dot').forEach((d, i) => d.classList.toggle('active', i === bannerIndex));
    }

    function clearCache() {
        if (confirm('清理本地缓存并重新从云端加载？')) {
            localStorage.clear();
            sessionStorage.clear();
            location.reload();
        }
    }

    async function cloudLoad() {
        try {
            const res = await fetch(`${WORKER_URL}/api/data`);
            if (!res.ok) throw new Error('网络错误');
            const parsed = await res.json();
            resources = parsed.resources || [];
            tierData = parsed.tierData || [];
            if (parsed.navTags) navTags = parsed.navTags;
            bannerData = parsed.bannerData || [];
            rankingList = parsed.rankingList || [];
            bpList = parsed.bpList || [];
        } catch(e) {
            showCloudToast('⚠️ 云端加载失败');
        }
    }

    async function cloudSave() {
        if (!adminToken) { showCloudToast('❌ 未登录'); return; }
        try {
            const res = await fetch(`${WORKER_URL}/api/data`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${adminToken}`,
                },
                body: JSON.stringify({ resources, tierData, navTags, bannerData, rankingList, bpList }),
            });
            const result = await res.json();
            if (!res.ok) {

            } else {

            }
        } catch(e) {
            showCloudToast('❌ 网络错误，请重试');
        }
    }

    function rkDetail(m, idx) {

            h += `<button onclick="rkAutoRank(${idx})" style="width:100%;padding:8px;border:1px solid #ff6699;background:#fff5f8;border-radius:8px;color:#ff6699;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:8px;">🏅 按大场分自动排名</button>`;
            h += `<button onclick="rkToggleEdit(${idx})" style="width:100%;padding:8px;border:1px solid #ddd;background:#fff;border-radius:8px;color:#666;font-size:13px;cursor:pointer;margin-bottom:8px;">✏️ 直接编辑数据</button>`;
            h += `<div id="rk-edit-area-${idx}"></div>`;
        }
        if (!data.length) { h += '<div style="text-align:center;color:#ccc;padding:20px;">暂无数据</div></div>'; return h; }
        const groups = {};
        data.forEach(p => { const g=p.group||'未分组'; if(!groups[g]) groups[g]=[]; groups[g].push(p); });
        let globalRank = 1;
        // 自动排名模式：把所有组的选手合并排序后重新分组
        const groupKeys = rkAutoRankIdx === idx
            ? (() => {
                const allSorted = [...data].sort((a,b) => b.big!==a.big?b.big-a.big:b.small-a.small);
                const sortedGroups = {};
                allSorted.forEach(p => { const g=p.group||'未分组'; if(!sortedGroups[g]) sortedGroups[g]=[]; sortedGroups[g].push(p); });
                return sortedGroups;
              })()
            : groups;
        Object.keys(groupKeys).forEach(g => {
            const players = groupKeys[g];
            h += `<div class="rk-group-title">📊 ${g}</div><table class="rk-table"><thead><tr><th>排名</th><th style="text-align:left;padding-left:8px;">选手ID</th><th>小场分</th><th>大场分</th><th>场次</th></tr></thead><tbody>`;
            players.forEach((p) => {
                const r = globalRank++;
                const cls=r===1?'rk-rank-1':r===2?'rk-rank-2':r===3?'rk-rank-3':'';
                h += `<tr class="${cls}"><td><span class="rk-rank">${r}</span></td><td class="rk-name">${p.id||'-'}</td><td class="rk-blue">${p.small??0}</td><td class="rk-blue">${p.big??0}</td><td class="rk-gray">${p.total||'0/7'}</td></tr>`;
            });
            h += '</tbody></table>';
        });
        h += '</div>';
        return h;
    }

    function rkUpload(input, idx) {
        const file = input.files[0];
        if (!file) return;
        if (typeof XLSX==='undefined') { showCloudToast('❌ 解析库未加载'); return; }
        const fname = file.name.replace(/\.[^.]+$/,'');
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const wb = XLSX.read(e.target.result,{type:'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
                const parsed=[]; let group='胜者组',colMap={},found=false;
                for (const row of rows) {
                    const s = row.map(c=>String(c||'')).join('');
                    if (!s.trim()) continue;
                    if (s.includes('胜')&&s.includes('者')&&!s.includes('ID')&&!s.includes('选手')) { group='胜者组'; continue; }
                    if (s.includes('败')&&s.includes('者')&&!s.includes('ID')&&!s.includes('选手')) { group='败者组'; continue; }
                    if (!found&&s.includes('选手')&&s.includes('分')) {
                        colMap={};
                        row.forEach((c,i)=>{ const v=String(c||'').trim();
                            if(v==='选手ID'||v==='ID'||v==='选手') colMap.id=i;
                            if(v==='小场分') colMap.small=i;
                            if(v==='大场分') colMap.big=i;
                            if(v==='场次') colMap.total=i;
                        });
                        if(colMap.id!==undefined) found=true; continue;
                    }
                    if(found&&colMap.id!==undefined){
                        const id=String(row[colMap.id]||'').trim();
                        if(!id) continue;
                        parsed.push({group,id,small:Number(row[colMap.small])||0,big:Number(row[colMap.big])||0,total:colMap.total!==undefined?String(row[colMap.total]||'0/7'):'0/7'});
                    }
                }
                if (!parsed.length) { showCloudToast('⚠️ 未能解析到数据'); return; }
                if (idx===-1) {
                    const t = prompt('请输入比赛标题', fname);
                    if (!t) return;
                    rankingList.unshift({title:t.trim()||fname, data:parsed});
                    rkOpenIdx=0;
                } else {
                    rankingList[idx].data = parsed;
                }
                showCloudToast('✅ 解析成功，共'+parsed.length+'名选手');
                renderRanking();
            } catch(err) { showCloudToast('❌ 解析失败: '+err.message); }
        };
        reader.readAsArrayBuffer(file);
        input.value='';
    }

    function bpPromptUrl(field, i) {
        const cur = bpEditData[field][i];
        const url = prompt('输入图片URL（图床链接）', cur||'');
        if (url === null) return;
        bpEditData[field][i] = url.trim();
        bpShowEditor();
    }

    function bpClearCard(field, i) {
        bpEditData[field][i] = '';
        bpShowEditor();
    }

    function bpSaveEdit() {
        const title = document.getElementById('bp-title-input').value.trim();
        if (!title) { alert('请输入比赛标题'); return; }
        bpEditData.title = title;
        if (bpEditMode === 'new') {
            bpList.unshift({...bpEditData});
            bpOpenIdx = 0;
        } else {
            bpList[bpEditMode] = {...bpEditData};
        }
        bpCancelEdit();
        renderBP();
    }

    function bpCancelEdit() {
        document.getElementById('bp-edit-overlay').style.display = 'none';
        bpEditMode = null;
        bpEditData = null;
    }

    function renderAll() {
        if(activePage === 'community') {
            renderBanner();
            renderCommunity();
        } else {
            const wrap = document.getElementById('banner-wrap');
            if (wrap) wrap.style.display = 'none';
            if(activePage === 'tier') {
                renderTier();
            } else if(activePage === 'ranking') {
                renderRanking();
            } else if(activePage === 'bp') {
                renderBP();
            }
        }
    }

    // ==== 社区渲染逻辑 (原汁原味 v17.1) ====
    function renderMarkdown(text) {
        if(!text) return "";
        let html = text.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1">');
        return html.split('\n').map(line => line.trim() ? `<p>${line}</p>` : '<div style="height:8px"></div>').join('');
    }

    function renderCommunity() {
        const nav = document.getElementById('nav');
        nav.innerHTML = navTags.map(tag => `<li class="${currentFilter === tag ? 'active' : ''}" onclick="setFilter('${tag}')">${tag}</li>`).join('');

        const list = document.getElementById('page-community');
        list.innerHTML = "";

        // 置顶文章排最前，保留原始索引
        const sorted = resources
            .map((res, i) => ({ res, i }))
            .sort((a, b) => (b.res.pinned ? 1 : 0) - (a.res.pinned ? 1 : 0));

        sorted.forEach(({ res, i }) => {
            const rawTags = (res.cat||"").trim().toLowerCase();
            const tagsArr = rawTags.split(/\s+/).filter(t => t);
            
            const matchesFilter = (currentFilter === "全部" || tagsArr.includes(currentFilter.toLowerCase()));
            const matchesSearch = (
                res.title.toLowerCase().includes(searchQuery) || 
                res.desc.toLowerCase().includes(searchQuery) || 
                rawTags.includes(searchQuery)
            );
            
            if (!matchesFilter || !matchesSearch) return;

            const card = document.createElement('div');
            card.className = 'card';
            if (res.pinned) card.style.border = '1.5px solid #ff6699';
            card.onclick = () => {
                if(isAdmin) { loadToForm_Post(i); return; }
                card.classList.toggle('expanded');
            };

            card.innerHTML = `
                <div class="card-main">
                    <div class="card-thumb"><img src="${res.cover || 'https://via.placeholder.com/150?text=PVZ'}"></div>
                    <div class="card-content">
                        <div class="card-title">${res.pinned ? '<span class="pin-badge">📌 置顶</span>' : ''}${res.title}</div>
                        <div>${tagsArr.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
                    </div>
                    ${isAdmin ? `
                    <div style="display:flex;flex-direction:column;gap:6px;align-self:center;margin-right:10px;flex-shrink:0;">
                        <button onclick="event.stopPropagation(); togglePin(${i})" style="color:${res.pinned?'#ff6699':'#aaa'};border:1px solid ${res.pinned?'#ff6699':'#ddd'};padding:4px 8px;border-radius:8px;background:none;font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;">${res.pinned?'📌 取消置顶':'📌 置顶'}</button>
                        <button onclick="event.stopPropagation(); doDelete_Post(${i})" style="color:red;border:1px solid red;padding:4px 8px;border-radius:8px;background:none;font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;">🗑️ 删除</button>
                    </div>` : ''}
                </div>
                <div class="detail-pane">
                    <div class="full-title">${res.title}</div>
                    <div class="article-content">${renderMarkdown(res.desc)}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // ==== 梯度渲染逻辑 ====
    function renderTier() {
        const container = document.getElementById('page-tier');
        const ranks = ['T0', 'T1', 'T2', 'T3', 'T4', 'T5'];
        const colors = ['var(--t0)', 'var(--t1)', 'var(--t2)', 'var(--t3)', 'var(--t4)', 'var(--t5)'];
        
        container.innerHTML = ranks.map((r, idx) => {
            const list = tierData.filter(d => d.side === currentSide && d.rank === r && (d.name.toLowerCase().includes(searchQuery) || (d.type||'').toLowerCase().includes(searchQuery)));
            if(list.length === 0 && searchQuery) return '';
            return `
                <div class="tier-row">
                    <div class="tier-header" style="color:${colors[idx]}">${r} <small>RANK</small></div>
                    <div class="tier-list">
                        ${list.map(item => `
                            <div class="tier-item" onclick="viewTierDetail('${item.name}')">
                                <img src="${item.img}" class="tier-img ${r==='T0'?'gold-border':''}" style="${r!=='T0'?'border-color:'+colors[idx]:''}">
                                <div class="tier-name">${item.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function viewTierDetail(name) {
        const item = tierData.find(d => d.name === name);
        if(!item) return;
        
        document.getElementById('m-rank').innerText = item.rank;
        document.getElementById('m-img').src = item.img;
        document.getElementById('m-name').innerText = item.name;
        document.getElementById('m-type').innerText = item.type || '-';
        document.getElementById('m-cooldown').innerText = item.cooldown || '-';
        document.getElementById('m-hp').innerText = item.hp || '-';

        document.getElementById('m-cost').innerText = item.cost || '-';
        document.getElementById('m-desc').innerText = item.desc || '尚未添加强度分析。';
        
        const head = document.getElementById('m-header');
        head.className = 'stat-header' + (item.side === 'zombie' ? ' is-zombie' : '');

        const delZone = document.getElementById('admin-del-zone');
        delZone.innerHTML = isAdmin ? `
            <button onclick="loadToForm_Tier('${item.name}');closeModal()" style="margin-top:20px; width:100%; color:#1e90ff; border:1px solid #1e90ff; background:none; padding:12px; border-radius:14px; font-weight:bold;">✏️ 编辑该记录</button>
            <button onclick="doDelete_Tier('${item.name}')" style="margin-top:10px; width:100%; color:red; border:1px solid red; background:none; padding:12px; border-radius:14px; font-weight:bold;">删除该记录</button>
        ` : '';
        
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

    // ==== 管理员与编辑器逻辑 ====
    function toggleAdmin() {
        if (!isAdmin) {
            adminLogin();
        } else {
            isAdmin = false;
            adminToken = null;
            rkOpenIdx = null;
            document.getElementById('admin-editor').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'none';
            // 清空所有积分榜编辑区
            document.querySelectorAll('[id^="rk-edit-area-"]').forEach(el => el.innerHTML = '');
            renderAll();
        }
    }

    function showEditor(type) {
        editMode = type;
        const fields = document.getElementById('editor-fields');
        
        if (type === 'post') {
            fields.innerHTML = `
                <textarea id="in-title" class="edit-input" style="min-height:90px; font-weight:bold; resize:vertical;" placeholder="输入文章标题..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <input type="text" id="in-cat" class="edit-input" placeholder="分类标签 (空格隔开，如：版本 梯度)">
                <input type="text" id="in-cover" class="edit-input" placeholder="封面图 URL">
                <div class="editor-toolbar">
                    <div class="tool-btn" onclick="askAndInsertImg()">🖼️ 插入图片代码</div>
                </div>
                <textarea id="in-desc" class="edit-input" style="min-height:200px;" placeholder="正文内容..."></textarea>
                <input type="hidden" id="edit-idx">
            `;
        } else if (type === 'nav') {
            fields.innerHTML = `
                <div style="font-size:13px; color:#888; margin-bottom:8px;">当前分类列表（每行一个，第一个必须是"全部"）：</div>
                <textarea id="in-navtags" class="edit-input" style="min-height:160px;">${navTags.join('\n')}</textarea>
                <input type="hidden" id="edit-idx">
            `;
        } else {
            fields.innerHTML = `
                <select id="t-side" class="edit-input"><option value="plant">植物阵营</option><option value="zombie">僵尸阵营</option></select>
                <select id="t-rank" class="edit-input"><option>T0</option><option>T1</option><option>T2</option><option>T3</option><option>T4</option><option>T5</option></select>
                <input id="t-name" class="edit-input" placeholder="名称 (必填)">
                <input id="t-img" class="edit-input" placeholder="头像图片 URL">
                <input id="t-type" class="edit-input" placeholder="特性/类型 (如: 爆发 控制)">
                <input id="t-cooldown" class="edit-input" placeholder="冷却时间">
                <input id="t-hp" class="edit-input" placeholder="血量（如：270 或 150+270）">
        
                <input id="t-cost" class="edit-input" placeholder="消耗价格">
                <textarea id="t-desc" class="edit-input" style="height:80px;" placeholder="强度点评..."></textarea>
                <input type="hidden" id="edit-idx">
            `;
        }
        
        document.getElementById('admin-editor').style.display = 'block';
        window.scrollTo(0,0);
    }

    function hideEditor() { document.getElementById('admin-editor').style.display = 'none'; }

    function askAndInsertImg() {
        const url = prompt("请输入图片 URL:");
        if (!url) return;
        const ta = document.getElementById('in-desc');
        const start = ta.selectionStart;
        const tag = `\n![图](${url})\n`;
        ta.value = ta.value.substring(0, start) + tag + ta.value.substring(ta.selectionEnd);
        ta.focus();
    }

    async function handleSave() {
        if (editMode === 'post') {
            const title = document.getElementById('in-title').value.trim();
            if(!title) return alert("标题不能为空");
            const data = { 
                title, 
                cat: document.getElementById('in-cat').value.trim(), 
                cover: document.getElementById('in-cover').value.trim(), 
                desc: document.getElementById('in-desc').value 
            };
            const idx = document.getElementById('edit-idx').value;
            if(idx !== "") resources[idx] = data; else resources.unshift(data);
        } else if (editMode === 'nav') {
            const lines = document.getElementById('in-navtags').value
                .split('\n').map(s => s.trim()).filter(s => s);
            if(!lines.length || lines[0] !== '全部') return alert('第一个分类必须是"全部"');
            navTags = lines;
            if(!navTags.includes(currentFilter)) currentFilter = '全部';
        } else {
            const name = document.getElementById('t-name').value.trim();
            if(!name) return alert("名称不能为空");
            const data = {
                side: document.getElementById('t-side').value,
                rank: document.getElementById('t-rank').value,
                name: name,
                img: document.getElementById('t-img').value,
                type: document.getElementById('t-type').value,
                cooldown: document.getElementById('t-cooldown').value,
                hp: document.getElementById('t-hp').value,
                ban: "",
                cost: document.getElementById('t-cost').value,
                desc: document.getElementById('t-desc').value
            };
            const tidx = document.getElementById('edit-idx').value;
            if (tidx !== '') tierData[tidx] = data; else tierData.push(data);
        }
        
        await cloudSave();
        hideEditor(); 
        renderAll();
    }


    function loadToForm_Tier(name) {
        const idx = tierData.findIndex(d => d.name === name);
        if (idx === -1) return;
        const item = tierData[idx];
        showEditor('tier');
        document.getElementById('t-side').value = item.side || 'plant';
        document.getElementById('t-rank').value = item.rank || 'T0';
        document.getElementById('t-name').value = item.name || '';
        document.getElementById('t-img').value = item.img || '';
        document.getElementById('t-type').value = item.type || '';
        document.getElementById('t-cooldown').value = item.cooldown || '';
        document.getElementById('t-hp').value = item.hp || '';
        document.getElementById('t-cost').value = item.cost || '';
        document.getElementById('t-desc').value = item.desc || '';
        document.getElementById('edit-idx').value = idx;
    }

    function loadToForm_Post(i) {
        showEditor('post');
        const res = resources[i];
        document.getElementById('in-title').value = res.title;
        document.getElementById('in-cat').value = res.cat;
        document.getElementById('in-cover').value = res.cover;
        document.getElementById('in-desc').value = res.desc;
        document.getElementById('edit-idx').value = i;
    }

    function resetForm() {
        document.getElementById('edit-idx').value = "";
    }

    async function togglePin(i) {
        resources[i].pinned = !resources[i].pinned;
        await cloudSave();
        renderAll();
    }

    async function doDelete_Post(i) {
        if(confirm("确定彻底删除这篇博文吗？")) { 
            resources.splice(i,1); 
            await cloudSave();
            renderAll(); 
        } 
    }
    
    async function doDelete_Tier(name) {
        if(confirm('确定删除该角色数据？')) {
            tierData = tierData.filter(d => d.name !== name);
            await cloudSave();
            closeModal(); 
            renderAll();
        }
    }
    
    // 💾 导出数据：同时打包 resources 和 tierData
    function exportHTML() {
        // 隐藏管理痕迹
        const controls = document.getElementById('admin-controls');
        const editor = document.getElementById('admin-editor');
        controls.style.display = "none";
        editor.style.display = "none";

        let htmlContent = document.documentElement.outerHTML;
        const dataString = `let resources = ${JSON.stringify(resources, null, 2)}; \n    let tierData = ${JSON.stringify(tierData, null, 2)};\n    let navTags = ${JSON.stringify(navTags)};`;
        htmlContent = htmlContent.replace(/let resources = \[.*?\];\s*let tierData = \[.*?\];\s*let navTags = \[.*?\];/s, dataString);
        
        if(isAdmin) controls.style.display = "flex";

        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `pvz_community_v21.html`;
        a.click();
    }
</script>
