<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVZ DLC 积分排行榜</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #ff6699; --bg: #f5f7fa; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: system-ui, sans-serif; padding-bottom: 40px; }

        header { background: #fff; border-bottom: 1px solid #eee; padding: 12px 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 17px; font-weight: bold; color: var(--primary); }
        .back-btn { font-size: 13px; color: #666; text-decoration: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 8px; }
        .lock-btn { font-size: 20px; cursor: pointer; }

        #admin-bar { display: none; background: #fff; border-bottom: 1px solid #ff669933; padding: 10px 15px; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .a-btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .a-btn-primary { background: var(--primary); color: #fff; }
        .a-btn-green { background: #4CAF50; color: #fff; }
        .a-btn-blue { background: #1e90ff; color: #fff; }
        .a-btn-red { background: #f44336; color: #fff; }

        .container { max-width: 700px; margin: 0 auto; padding: 15px; }

        /* 分组标题 */
        .group-title { font-size: 15px; font-weight: bold; color: #fff; background: var(--primary); padding: 8px 15px; border-radius: 10px 10px 0 0; margin-top: 20px; display: flex; align-items: center; gap: 6px; }

        /* 表格 */
        .rank-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 0 0 12px 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 5px; }
        .rank-table th { background: #f8f8f8; color: #888; font-size: 12px; padding: 8px 6px; text-align: center; border-bottom: 1px solid #eee; }
        .rank-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .rank-table tr:last-child td { border-bottom: none; }
        .rank-table tr:hover td { background: #fff5f8; }

        .rank-num { font-weight: bold; font-size: 16px; color: var(--primary); }
        .rank-1 .rank-num { color: #f5a623; font-size: 18px; }
        .rank-2 .rank-num { color: #9b9b9b; }
        .rank-3 .rank-num { color: #cd7f32; }
        .player-name { font-weight: bold; color: #222; text-align: left; padding-left: 10px; }
        .score-big { font-weight: bold; color: #1e90ff; }
        .games { color: #999; font-size: 12px; }

        /* 编辑表格 */
        #edit-table-wrap { display: none; background: #fff; border-radius: 12px; padding: 15px; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
        #edit-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
        #edit-table th { background: #f8f8f8; padding: 8px; text-align: center; border: 1px solid #eee; color: #666; }
        #edit-table td { border: 1px solid #eee; padding: 4px; }
        #edit-table input { width: 100%; border: none; padding: 5px; font-size: 13px; text-align: center; background: transparent; }
        #edit-table input:focus { background: #fff5f8; outline: none; }
        .del-row { color: red; cursor: pointer; font-size: 16px; background: none; border: none; padding: 4px 8px; }
        .group-header-row td { background: #fff0f5; font-weight: bold; color: var(--primary); }

        /* 空状态 */
        .empty { text-align: center; color: #ccc; padding: 40px; font-size: 15px; }

        /* toast */
        #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

        /* 加载 */
        #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 16px; color: var(--primary); }

        /* 文件上传区 */
        #upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 25px; text-align: center; color: #aaa; font-size: 14px; cursor: pointer; margin-top: 10px; }
        #upload-area:hover { border-color: var(--primary); color: var(--primary); }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="loading">☁️ 正在加载数据…</div>
<div id="toast"></div>

<header>
    <a href="/" class="back-btn">← 返回社区</a>
    <div class="header-title">🏆 积分排行榜</div>
    <div class="lock-btn" onclick="toggleAdmin()">🔒</div>
</header>

<div id="admin-bar">
    <button class="a-btn a-btn-green" onclick="document.getElementById('file-input').click()">📂 上传 xlsx</button>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(this)">
    <button class="a-btn a-btn-primary" onclick="addRow()">➕ 添加选手</button>
    <button class="a-btn a-btn-blue" onclick="cloudSave()">☁️ 保存到云端</button>
    <button class="a-btn" onclick="toggleEdit()" id="edit-toggle-btn">✏️ 编辑模式</button>
    <button class="a-btn a-btn-red" onclick="clearAll()">🗑️ 清空数据</button>
</div>

<div class="container">
    <div id="rank-view"></div>

    <div id="edit-table-wrap">
        <div style="font-size:13px;color:#999;margin-bottom:10px;">💡 直接点击单元格即可编辑，修改后点「保存到云端」</div>
        <table id="edit-table">
            <thead>
                <tr>
                    <th>组别</th>
                    <th>选手ID</th>
                    <th>小场分(胜)</th>
                    <th>小场分(负)</th>
                    <th>大场分</th>
                    <th>场次</th>
                    <th>删除</th>
                </tr>
            </thead>
            <tbody id="edit-tbody"></tbody>
        </table>
        <button class="a-btn a-btn-green" onclick="addRow()" style="margin-top:12px;width:100%;">➕ 添加一行</button>
    </div>

    <div id="upload-area" onclick="document.getElementById('file-input').click()" style="display:none;">
        📂 点击上传 xlsx 文件，自动解析数据
    </div>
</div>

<script>
    const WORKER_URL = 'https://pvz-api.pvzdlc.qzz.io';
    const KV_KEY = 'pvz_ranking';
    let isAdmin = false;
    let adminToken = null;
    let rankingData = []; // [{group, id, win, lose, big, total}]
    let editMode = false;

    // ===== 初始化 =====
    window.onload = async function() {
        await cloudLoad();
        document.getElementById('loading').remove();
        renderRank();
    };

    // ===== 云端读取 =====
    async function cloudLoad() {
        try {
            const res = await fetch(`${WORKER_URL}/api/ranking`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            rankingData = data.ranking || [];
        } catch(e) {
            showToast('⚠️ 云端加载失败');
        }
    }

    // ===== 云端保存 =====
    async function cloudSave() {
        if (!adminToken) { showToast('❌ 未登录'); return; }
        // 如果在编辑模式，先从表格读取最新数据
        if (editMode) syncFromEditTable();
        try {
            const res = await fetch(`${WORKER_URL}/api/ranking`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ ranking: rankingData })
            });
            const result = await res.json();
            if (!res.ok) {
                showToast('❌ ' + (result.error || '保存失败'));
                if (res.status === 401) logout();
            } else {
                showToast('✅ 已同步到云端');
                renderRank();
            }
        } catch(e) {
            showToast('❌ 网络错误');
        }
    }

    // ===== 渲染排行榜 =====
    function renderRank() {
        const view = document.getElementById('rank-view');
        if (!rankingData.length) {
            view.innerHTML = '<div class="empty">暂无数据，管理员可上传 xlsx 或手动添加</div>';
            return;
        }

        // 按组分组
        const groups = {};
        rankingData.forEach(p => {
            const g = p.group || '未分组';
            if (!groups[g]) groups[g] = [];
            groups[g].push(p);
        });

        // 每组内按大场分降序，大场分相同按小场分(胜)降序
        let html = '';
        Object.keys(groups).forEach(g => {
            const players = groups[g].sort((a, b) => {
                if (b.big !== a.big) return b.big - a.big;
                return b.win - a.win;
            });
            html += `<div class="group-title">📊 ${g}</div>`;
            html += `<table class="rank-table">
                <thead><tr>
                    <th>排名</th><th style="text-align:left;padding-left:10px;">选手ID</th>
                    <th>小场分</th><th>大场分</th><th>场次</th>
                </tr></thead><tbody>`;
            players.forEach((p, idx) => {
                const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : '';
                const total = p.total || '0/7';
                html += `<tr class="${rankClass}">
                    <td><span class="rank-num">${idx + 1}</span></td>
                    <td class="player-name">${p.id || '-'}</td>
                    <td>${p.win ?? 0}胜 ${p.lose ?? 0}负</td>
                    <td class="score-big">${p.big ?? 0}</td>
                    <td class="games">${total}</td>
                </tr>`;
            });
            html += '</tbody></table>';
        });
        view.innerHTML = html;
    }

    // ===== 渲染编辑表格 =====
    function renderEditTable() {
        const tbody = document.getElementById('edit-tbody');
        tbody.innerHTML = '';
        rankingData.forEach((p, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input value="${p.group||''}" onchange="rankingData[${i}].group=this.value" placeholder="胜者组/败者组"></td>
                <td><input value="${p.id||''}" onchange="rankingData[${i}].id=this.value" placeholder="选手ID"></td>
                <td><input type="number" value="${p.win??0}" onchange="rankingData[${i}].win=+this.value"></td>
                <td><input type="number" value="${p.lose??0}" onchange="rankingData[${i}].lose=+this.value"></td>
                <td><input type="number" value="${p.big??0}" onchange="rankingData[${i}].big=+this.value"></td>
                <td><input value="${p.total||'0/7'}" onchange="rankingData[${i}].total=this.value" placeholder="0/7"></td>
                <td><button class="del-row" onclick="delRow(${i})">✕</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ===== 从编辑表格同步数据 =====
    function syncFromEditTable() {
        const rows = document.querySelectorAll('#edit-tbody tr');
        rankingData = Array.from(rows).map(tr => {
            const inputs = tr.querySelectorAll('input');
            return {
                group: inputs[0].value,
                id: inputs[1].value,
                win: +inputs[2].value || 0,
                lose: +inputs[3].value || 0,
                big: +inputs[4].value || 0,
                total: inputs[5].value || '0/7'
            };
        });
    }

    // ===== 切换编辑模式 =====
    function toggleEdit() {
        editMode = !editMode;
        document.getElementById('edit-table-wrap').style.display = editMode ? 'block' : 'none';
        document.getElementById('rank-view').style.display = editMode ? 'none' : 'block';
        document.getElementById('edit-toggle-btn').textContent = editMode ? '👁️ 查看模式' : '✏️ 编辑模式';
        if (editMode) renderEditTable();
        else { syncFromEditTable(); renderRank(); }
    }

    // ===== 添加行 =====
    function addRow() {
        if (editMode) syncFromEditTable();
        rankingData.push({ group: '胜者组', id: '', win: 0, lose: 0, big: 0, total: '0/7' });
        if (editMode) renderEditTable();
    }

    // ===== 删除行 =====
    function delRow(i) {
        rankingData.splice(i, 1);
        renderEditTable();
    }

    // ===== 清空数据 =====
    function clearAll() {
        if (confirm('确定清空所有数据？')) {
            rankingData = [];
            renderRank();
            renderEditTable();
        }
    }

    // ===== 解析 xlsx =====
    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const wb = XLSX.read(e.target.result, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                // 自动解析：找到表头行，支持多种格式
                // 列映射：排名/rank, 选手ID/id, 小场分胜/win, 小场分负/lose, 大场分/big, 场次/total, 组/group
                const parsed = [];
                let currentGroup = '胜者组';
                let headerFound = false;
                let colMap = {};

                rows.forEach((row, ri) => {
                    const rowStr = row.join('').toLowerCase();

                    // 检测组别行（如"胜者组"、"败者组"）
                    if (rowStr.includes('胜者') || rowStr.includes('败者') || rowStr.includes('胜组') || rowStr.includes('败组')) {
                        const groupCell = row.find(c => String(c).includes('胜') || String(c).includes('败'));
                        if (groupCell) currentGroup = String(groupCell).trim();
                        headerFound = false;
                        return;
                    }

                    // 检测表头行
                    if (!headerFound && (rowStr.includes('id') || rowStr.includes('选手') || rowStr.includes('大场'))) {
                        colMap = {};
                        row.forEach((cell, ci) => {
                            const c = String(cell).toLowerCase();
                            if (c.includes('id') || c.includes('选手')) colMap.id = ci;
                            if (c.includes('小场') && (c.includes('胜') || c.includes('win'))) colMap.win = ci;
                            if (c.includes('小场') && (c.includes('负') || c.includes('lose'))) colMap.lose = ci;
                            if (c.includes('大场')) colMap.big = ci;
                            if (c.includes('场次') || c.includes('total')) colMap.total = ci;
                            if (c.includes('组') || c.includes('group')) colMap.group = ci;
                        });
                        headerFound = true;
                        return;
                    }

                    // 数据行
                    if (headerFound && colMap.id !== undefined) {
                        const id = String(row[colMap.id] || '').trim();
                        if (!id || id === '0') return; // 跳过空行
                        parsed.push({
                            group: colMap.group !== undefined ? String(row[colMap.group] || currentGroup) : currentGroup,
                            id,
                            win: Number(row[colMap.win]) || 0,
                            lose: Number(row[colMap.lose]) || 0,
                            big: Number(row[colMap.big]) || 0,
                            total: colMap.total !== undefined ? String(row[colMap.total] || '0/7') : '0/7'
                        });
                    }
                });

                if (!parsed.length) {
                    showToast('⚠️ 未能解析到数据，请检查表格格式');
                    return;
                }

                rankingData = parsed;
                showToast(`✅ 解析成功，共 ${parsed.length} 名选手`);
                if (editMode) renderEditTable();
                else renderRank();
            } catch(err) {
                showToast('❌ 解析失败：' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
        input.value = '';
    }

    // ===== 管理员登录/退出 =====
    async function toggleAdmin() {
        if (!isAdmin) {
            const pwd = prompt('请输入管理密码');
            if (!pwd) return;
            try {
                const res = await fetch(`${WORKER_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                const result = await res.json();
                if (result.success && result.token) {
                    adminToken = result.token;
                    isAdmin = true;
                    document.getElementById('admin-bar').style.display = 'flex';
                    showToast('✅ 登录成功');
                } else {
                    showToast('❌ ' + (result.message || '密码错误'));
                }
            } catch(e) { showToast('❌ 网络错误'); }
        } else {
            logout();
        }
    }

    function logout() {
        isAdmin = false;
        adminToken = null;
        editMode = false;
        document.getElementById('admin-bar').style.display = 'none';
        document.getElementById('edit-table-wrap').style.display = 'none';
        document.getElementById('rank-view').style.display = 'block';
        renderRank();
        showToast('已退出管理员模式');
    }

    // ===== Toast =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    }
</script>
</body>
</html>
